<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplificando Cifras</title>
<meta name="theme-color" content="#07111f">
<meta name="description" content="App de cifras simplificadas com playlists, medley, transposição e modo palco.">
<link rel="manifest" href="manifest.webmanifest?v=10">
<link rel="icon" href="assets/icons/pwa-icon-v10-192.png" sizes="192x192" type="image/png">
<link rel="icon" href="assets/icons/pwa-icon-v10-512.png" sizes="512x512" type="image/png">
<link rel="apple-touch-icon" href="assets/icons/pwa-icon-v10-192.png" sizes="192x192">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1a2e;--bg2:#22223b;--bg3:#2d2d44;
  --accent:#d97757;--accent2:rgba(217,119,87,0.18);
  --text:#ede8e3;--text2:#9b95a3;
  --chord-color:#E8896B;
  --music-accent:#E8896B;
  --border:rgba(255,255,255,0.08);
  --danger:#e05c6a;
}
html,body{width:100%;min-height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;justify-content:center;min-height:100vh;}
.app{width:100%;max-width:720px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 32px rgba(0,0,0,.18);}
/* TOPBAR */
.topbar{background:var(--bg2);padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.topbar-icon{font-size:22px;}
.topbar-info{flex:1;min-width:0;}
.topbar-title{font-size:17px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-sub{font-size:11px;color:var(--accent);margin-top:1px;}
.export-library-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:7px 9px;font:600 11px/1.2 inherit;cursor:pointer;white-space:nowrap;}
.export-library-btn:hover{background:var(--accent2);}
/* TABS */
.tab-bar{background:var(--bg2);display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;font-weight:500;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* SEARCH */
.search-bar{padding:9px 12px;background:var(--bg2);border-bottom:1px solid var(--border);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;}
.search-input{width:100%;background:var(--bg3);border:none;border-radius:9px;padding:8px 13px 8px 34px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.search-input::placeholder{color:var(--text2);}
/* LIST */
.content{flex:1;overflow-y:auto;padding-bottom:72px;}
.section-label{padding:7px 15px 3px;font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.6px;text-transform:uppercase;background:var(--bg);}
.music-item{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.music-item:hover{background:var(--bg2);}
.music-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.music-info{flex:1;min-width:0;}
.music-title{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.music-sub{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.key-badge{font-size:13px;background:rgba(232,137,107,.14);color:var(--music-accent);padding:4px 10px;border-radius:10px;font-weight:700;flex-shrink:0;}
/* FAB */
.fab{position:fixed;bottom:22px;right:max(16px,calc((100vw - 720px)/2 + 16px));width:54px;height:54px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;box-shadow:0 4px 16px rgba(217,119,87,.4);transition:transform .15s;font-size:26px;color:#fff;font-weight:300;}
.fab:hover{transform:scale(1.06);}
/* DETAIL VIEW */
.detail-view{display:none;position:fixed;inset:0 auto 0 50%;transform:translateX(-50%);width:100%;max-width:720px;height:100dvh;background:var(--bg);overflow-x:hidden;overflow-y:auto;overscroll-behavior-y:contain;flex-direction:column;z-index:10;box-shadow:0 0 32px rgba(0,0,0,.28);}
.detail-header{background:var(--bg2);padding:13px 15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.back-btn{color:var(--accent);font-size:24px;cursor:pointer;flex-shrink:0;line-height:1;}
.detail-title-wrap{flex:1;min-width:0;}
.detail-title{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.detail-artist{font-size:13px;color:var(--text2);margin-top:2px;}
.detail-capo{font-size:12px;color:var(--text2);margin-top:2px;}
.detail-key-badge{font-size:13px;background:rgba(232,137,107,.14);color:var(--music-accent);padding:4px 11px;border-radius:10px;font-weight:700;flex-shrink:0;}
/* TRANSPOSITOR */
.transpose-bar{margin:12px 14px 4px;background:var(--bg3);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.transpose-label{font-size:13px;color:var(--text2);flex:1;}
.transpose-semitone{font-size:12px;color:var(--text2);min-width:24px;text-align:center;}
.t-btn{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit;}
.t-btn:hover{background:var(--accent2);color:var(--accent);border-color:var(--accent);}
.transpose-key{font-size:17px;font-weight:700;color:var(--music-accent);min-width:40px;text-align:center;}
.t-reset{font-size:12px;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:inherit;transition:all .15s;}
.t-reset:hover{border-color:var(--accent);color:var(--accent);}
/* CAPO BANNER */
.capo-banner{margin:10px 14px 0;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;border:2px solid;}
.capo-banner.on{background:rgba(255,200,0,0.12);border-color:rgba(255,200,0,0.5);}
.capo-banner.off{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);}
.capo-icon{font-size:24px;flex-shrink:0;}
.capo-info{flex:1;}
.capo-title{font-size:14px;font-weight:700;}
.capo-banner.on .capo-title{color:#ffc800;}
.capo-banner.off .capo-title{color:var(--text2);}
.capo-sub{font-size:12px;margin-top:1px;}
.capo-banner.on .capo-sub{color:rgba(255,200,0,0.7);}
.capo-banner.off .capo-sub{color:var(--text2);}
.capo-toggle{width:42px;height:24px;border-radius:12px;position:relative;transition:background .2s;flex-shrink:0;}
.capo-banner.on .capo-toggle{background:#ffc800;}
.capo-banner.off .capo-toggle{background:var(--bg3);}
.capo-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;transition:left .2s;}
.capo-banner.on .capo-toggle::after{left:21px;}
.capo-banner.off .capo-toggle::after{left:3px;}
/* AI SEARCH */
.ai-search-bar{margin:10px 14px 0;background:var(--bg3);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);transition:border-color .2s;}
.ai-search-bar:focus-within{border-color:var(--accent);}
.ai-search-input{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.ai-search-input::placeholder{color:var(--text2);}
.ai-search-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s;}
.ai-search-btn:hover{opacity:.85;}
.ai-search-btn:disabled{opacity:.5;cursor:not-allowed;}
.ai-result{margin:8px 14px 0;background:var(--bg3);border-radius:12px;padding:12px 14px;border:1px solid var(--border);}
.ai-result-title{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.ai-result pre{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.6;}
.pl-sel-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--accent2);transition:opacity .15s;}
.pl-sel-row.dragging{opacity:.4;}
.pl-add-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.pl-add-row:hover{background:var(--bg2);}
/* CAPO SELECTOR */
.capo-opt{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:16px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;transition:all .15s;flex-shrink:0;}
.capo-opt.active{background:var(--music-accent);color:#fff;border-color:var(--music-accent);}
/* INSTRUMENT TABS (compacto) */
.inst-tab{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;}
.inst-tab.active{background:var(--accent2);border-color:rgba(217,119,87,0.4);}
/* CHORD STRIP */
.chord-strip-wrap{display:flex;width:100%;max-width:100%;overflow-x:auto;overflow-y:hidden;padding:12px 16px 15px;scroll-padding-inline:16px;gap:10px;background:var(--bg2);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;overscroll-behavior-inline:contain;touch-action:pan-x;scrollbar-width:thin;scrollbar-color:var(--accent) var(--bg3);}
.chord-strip-wrap::-webkit-scrollbar{height:6px;}
.chord-strip-wrap::-webkit-scrollbar-track{background:var(--bg3);border-radius:6px;}
.chord-strip-wrap::-webkit-scrollbar-thumb{background:var(--accent);border-radius:6px;}
.chord-card{display:flex;flex:0 0 auto;min-width:146px;max-width:none;min-height:176px;padding:10px 12px;text-align:center;align-items:center;justify-content:flex-start;flex-direction:column;border:1px solid var(--border);border-radius:14px;background:var(--bg);scroll-snap-align:start;}
.chord-card-name{width:100%;min-height:20px;margin-bottom:5px;color:var(--chord-color);font:700 13px/1.25 Arial,sans-serif;white-space:nowrap;overflow:visible;text-align:center;}
.chord-tuning{max-width:240px;margin-top:7px;color:var(--music-accent);font:600 9px/1.35 Inter,Arial,sans-serif;text-align:center;}
.keyboard-card{min-width:278px;}
.chord-card svg{display:block;flex:none;max-width:none;}
.chord-card-unavailable{min-width:144px;justify-content:center;}
.chord-unavailable-message{max-width:120px;color:var(--text2);font-size:11px;line-height:1.35;}
/* CHORD BLOCKS - estilo WhatsApp com blocos */
.detail-body{padding:16px 20px;}
.wa-block{background:var(--bg3);border-radius:10px;border:1px solid var(--border);padding:14px 16px;margin-bottom:14px;}
.chord-line{font-family:Arial,sans-serif;font-size:22px;color:var(--chord-color);letter-spacing:.5px;line-height:1.8;font-weight:600;}
.letra-linha{font-family:Arial,sans-serif;font-size:20px;font-weight:700;color:#ffffff;margin:4px 0 0;}
/* MODO PALCO */
.stage-mode .detail-header .back-btn,
.stage-mode #capo-banner,
.stage-mode .btn-row,
.stage-mode .stage-hide{display:none!important;}
.stage-mode #chord-diagrams-section,
.stage-mode #inst-modal{display:none!important;}
.stage-mode .chord-block{background:transparent;border:none;margin-bottom:8px;}
.stage-mode .chord-block summary{font-size:20px;padding:6px 0;}
.stage-mode .chord-line{font-size:var(--stage-chord-size,28px);line-height:2.2;}
.stage-mode .detail-body{padding:12px clamp(10px,3vw,28px);}
/* TOOLBAR PALCO */
.stage-toolbar{display:flex;gap:8px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;}
.stage-toolbar[hidden]{display:none!important;}
.stage-btn[hidden]{display:none!important;}
.stage-only-control{display:none!important;}
.stage-mode .stage-only-control{display:flex!important;}
.stage-btn:disabled{opacity:.38;cursor:not-allowed;}
.stage-btn{flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
.stage-btn-palco{background:rgba(217,119,87,.15);color:var(--accent);border:1.5px solid var(--accent);}
.stage-btn-palco.active{background:var(--accent);color:#fff;}
.stage-btn-scroll{background:rgba(100,200,100,.12);color:#6dc46d;border:1.5px solid #6dc46d;}
.stage-btn-scroll.active{background:#6dc46d;color:#fff;}
/* MEDLEY */
.medley-block{background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1.5px solid rgba(217,119,87,0.3);}
.medley-block-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.medley-source{font-size:12px;color:var(--accent);font-weight:700;flex:1;}
.medley-order-btns{display:flex;gap:4px;}
.medley-order-btn{width:28px;height:28px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.medley-remove{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid var(--danger);color:var(--danger);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* BUTTONS */
.btn{width:100%;padding:11px;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:9px;font-family:inherit;transition:opacity .15s;}
.btn-primary{background:var(--accent);}
.btn-primary:hover{opacity:.88;}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);margin-top:8px;}
.btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger);margin-top:7px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn-row .btn{margin:0;flex:1;padding:9px;font-size:13px;}
/* SETLISTS */
.setlist-item{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.setlist-item:hover{background:var(--bg2);}
.sl-avatar{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sl-info{flex:1;min-width:0;}
.sl-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sl-sub{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sl-count{font-size:11px;background:var(--bg3);color:var(--text2);padding:3px 8px;border-radius:10px;flex-shrink:0;}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.78);z-index:30;display:none;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:620px;padding:18px 16px 24px;max-height:92dvh;overflow-x:hidden;overflow-y:auto;}
.modal-handle{width:34px;height:3px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.form-group{margin-bottom:11px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.form-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.form-input:focus{border-color:var(--accent);}
.form-textarea{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;min-height:130px;resize:vertical;line-height:1.6;}
.form-textarea:focus{border-color:var(--accent);}
/* CHIPS */
.chips-wrap{display:flex;flex-wrap:wrap;margin-top:5px;max-height:170px;overflow-y:auto;gap:4px;}
.chip{display:inline-flex;background:var(--bg3);color:var(--text2);padding:5px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-weight:500;}
.chip.selected{background:var(--accent2);color:var(--accent);border-color:var(--accent);}
/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);}
.empty-state .emoji{font-size:44px;margin-bottom:12px;}
.empty-state p{font-size:14px;}
/* SD numbered */
.sd-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.sd-num{width:24px;height:24px;background:var(--accent2);color:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
@media (max-width:520px){
  .app{box-shadow:none;}
  .detail-view{box-shadow:none;}
}
@media (max-width:360px){
  .topbar{padding:11px 8px;gap:7px;}
  .topbar-icon{font-size:19px;}
  .topbar-title{font-size:15px;}
  .export-library-btn{padding:6px 7px;font-size:10px;}
  .tab{font-size:12px;padding-inline:2px;}
  .transpose-bar{margin-inline:8px;padding:8px;gap:5px;}
  .transpose-label{display:none;}
  .stage-toolbar{padding:8px;gap:4px;}
  .stage-btn{min-width:0;padding:7px 4px;font-size:11px;}
  .detail-body{padding-inline:12px;}
}
/* IDENTIDADE VISUAL 2026 — somente apresentação */
:root{--bg:#07111f;--bg2:#0b1728;--bg3:#111f33;--surface:#0e1c2f;--surface-hover:#142640;--accent:#2563eb;--accent-hover:#3b82f6;--accent2:rgba(37,99,235,.16);--success:#22c55e;--success-soft:rgba(34,197,94,.13);--text:#f8fafc;--text2:#94a3b8;--border:rgba(148,163,184,.15);--danger:#f87171;--shadow:0 18px 50px rgba(0,0,0,.28);--music-accent:#E8896B}
html{background:#050b14}
body{font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(circle at 12% 4%,rgba(37,99,235,.15),transparent 30rem),radial-gradient(circle at 88% 96%,rgba(34,197,94,.08),transparent 26rem),#050b14}
button,input,textarea,select{font:inherit}
button,.tab,.music-item,.setlist-item,.fab,.chip,.capo-opt{-webkit-tap-highlight-color:transparent}
button:focus-visible,input:focus-visible,textarea:focus-visible,.tab:focus-visible,.music-item:focus-visible{outline:3px solid rgba(59,130,246,.45);outline-offset:2px}
.app{max-width:720px;background:linear-gradient(180deg,rgba(11,23,40,.98),var(--bg) 22%);border-inline:1px solid rgba(148,163,184,.08);box-shadow:0 0 70px rgba(0,0,0,.42)}
.topbar{min-height:78px;padding:14px 18px;gap:13px;background:rgba(7,17,31,.88);border-bottom:1px solid var(--border);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.topbar-icon{width:46px;height:46px;flex:0 0 46px;overflow:hidden;border-radius:14px;color:transparent;font-size:0;background:url('assets/logo-simplificando-cifras.png') center/cover no-repeat;box-shadow:0 7px 22px rgba(37,99,235,.26),inset 0 0 0 1px rgba(255,255,255,.1)}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:-.35px}.topbar-sub{font-size:11px;color:var(--success);font-weight:600;margin-top:3px}
.export-library-btn{min-height:36px;padding:8px 12px;color:#dbeafe;background:rgba(37,99,235,.1);border:1px solid rgba(96,165,250,.32);border-radius:11px;font-size:10.5px;transition:background .2s,border-color .2s,transform .2s}
.export-library-btn:hover{background:rgba(37,99,235,.2);border-color:#3b82f6;transform:translateY(-1px)}
.tab-bar{position:relative;gap:6px;padding:7px 12px 9px;background:rgba(7,17,31,.92);border-bottom:1px solid var(--border)}
.tab{min-height:42px;padding:11px 8px;border:1px solid transparent;border-radius:12px;color:var(--text2);font-size:12.5px;font-weight:600;transition:background .2s,color .2s,border-color .2s}

<div class="app" id="app">
  <!-- MAIN VIEW -->
  <div id="view-main" style="display:flex;flex-direction:column;height:100vh;">
    <div class="topbar">
      <div class="topbar-icon">🎸</div>

    </div>
    <div class="tab-bar">
      <div class="tab active" id="tab-musicas" onclick="switchTab('musicas')">🎵 Músicas</div>
      <div class="tab" id="tab-setlists" onclick="switchTab('setlists')">📋 Playlists</div>
      <div class="tab" id="tab-medley" onclick="switchTab('medley')">🎛️ Medley</div>
    </div>
    <div id="pane-musicas" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="text" placeholder="Buscar música ou tom..." id="search-music" oninput="renderMusicas()">

      </div>
      <!-- BUSCA IA -->
      <div class="ai-search-bar">
        <span style="font-size:16px;">🤖</span>

      </div>
      <div id="ai-result" style="display:none;"></div>
      <div class="content" id="lista-musicas"></div>
    </div>
    <div id="pane-setlists" style="display:none;flex:1;overflow:hidden;">

    <div id="pane-medley" style="display:none;flex:1;overflow:hidden;">

          <span id="inst-label">🎸 Violão</span> <span style="color:var(--text2);">▾</span>
        </button>
      </div>
      <div id="chord-strip"></div>
    </div>

    <!-- MODAL DE INSTRUMENTOS -->
    <div id="inst-modal" onclick="closeInstModal(event)" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:40;align-items:flex-end;justify-content:center;">
      <div onclick="event.stopPropagation()" style="background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:420px;padding-bottom:24px;border-top:1px solid var(--border);">

          <span onclick="closeInstModal()" style="color:var(--accent);font-size:20px;cursor:pointer;">←</span>
          <span style="font-size:16px;font-weight:700;">Acordes</span>

    <!-- CAPO SELECTOR (estilo Cifra Club) -->
    <div id="capo-row" style="background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;">🎸 Capo</span>
      <div style="display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:2px;">
        <button class="capo-opt active" id="capo-opt-0" onclick="selectCapo(0)">Sem</button>
        <button class="capo-opt" id="capo-opt-1" onclick="selectCapo(1)">1ª</button>
        <button class="capo-opt" id="capo-opt-2" onclick="selectCapo(2)">2ª</button>
        <button class="capo-opt" id="capo-opt-3" onclick="selectCapo(3)">3ª</button>
        <button class="capo-opt" id="capo-opt-4" onclick="selectCapo(4)">4ª</button>
        <button class="capo-opt" id="capo-opt-5" onclick="selectCapo(5)">5ª</button>
        <button class="capo-opt" id="capo-opt-6" onclick="selectCapo(6)">6ª</button>
        <button class="capo-opt" id="capo-opt-7" onclick="selectCapo(7)">7ª</button>
      </div>
    </div>
    <!-- TRANSPOSITOR -->
    <div class="transpose-bar">
      <span class="transpose-label">🎼 Transpor tom</span>
      <span class="transpose-semitone" id="semitone-label">+0</span>
      <button class="t-btn" onclick="transpose(-1)">−</button>
      <span class="transpose-key" id="transposed-key"></span>
      <button class="t-btn" onclick="transpose(+1)">+</button>
      <button class="t-reset" onclick="resetTranspose()">Original</button>
    </div>
    <div class="stage-toolbar">
      <button class="stage-btn stage-btn-palco" id="btn-palco" onclick="toggleStageModeBtn()">Modo Palco</button>
      <button class="stage-btn stage-btn-scroll" id="btn-scroll" onclick="toggleAutoScroll()">▶ Auto-Scroll</button>
    </div>
    <div class="stage-toolbar" aria-label="Controles de apresentação">
      <button class="stage-btn" id="btn-previous-song" onclick="navigateSong(-1)" title="Música anterior" hidden>← Anterior</button>
      <button class="stage-btn stage-only-control" id="btn-speed" onclick="cycleScrollSpeed()" title="Velocidade do auto-scroll">Vel. 1x</button>
      <button class="stage-btn stage-only-control" id="btn-font" onclick="cycleStageFont()" title="Tamanho das cifras">Fonte M</button>
      <button class="stage-btn" id="btn-next-song" onclick="navigateSong(1)" title="Próxima música" hidden>Próxima →</button>
    </div>
    <div class="detail-body" id="detail-content"></div>
  </div>

    </div>

    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div id="modal-body"></div>
    </div>
  </div>
</div>

<script>
// ── TRANSPOSIÇÃO ──────────────────────────────────────────────────────
const SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const ALL_CHORDS = ['C#m','Dbm','D#m','Ebm','F#m','Gbm','G#m','Abm','A#m','Bbm',
                    'C#','Db','D#','Eb','F#','Gb','G#','Ab','A#','Bb',
                    'Cm','Dm','Em','Fm','Gm','Am','Bm','C','D','E','F','G','A','B'];

function noteIdx(n){let i=SHARP.indexOf(n);return i===-1?FLAT.indexOf(n):i;}
function shiftNote(n,s){
  const i=noteIdx(n); if(i===-1) return n;
  const ni=((i+s)%12+12)%12;
  return FLAT.includes(n)?FLAT[ni]:SHARP[ni];
}
function shiftToken(tok,s){
  for(const cn of ALL_CHORDS){
    if(tok.startsWith(cn)){
      const suf=tok.slice(cn.length);
      const isMinor=cn.length>1&&cn.endsWith('m');
      const root=isMinor?cn.slice(0,-1):cn;
      const newRoot=shiftNote(root,s);
      if(suf.startsWith('/')){return newRoot+(isMinor?'m':'')+'/'+shiftNote(suf.slice(1),s);}
      return newRoot+(isMinor?'m':'')+suf;
    }
  }
  return tok;
}
function shiftText(text,s){
  if(!s) return text;
  return text.split('\n').map(line=>
    line.replace(/[A-G][#b]?[a-z0-9#()\/]*/g,tok=>{
      for(const cn of ALL_CHORDS){if(tok.startsWith(cn)) return shiftToken(tok,s);}
      return tok;
    })
  ).join('\n');
}

}
function showToast(msg){
  let t=document.getElementById('toast');

  t.textContent=msg;t.style.opacity='1';clearTimeout(t._timer);t._timer=setTimeout(()=>t.style.opacity='0',1800);
}

  {id:4,title:'Além do impossível',key:'A',capo:'Capotraste casa 2',blocos:[{l:'Eu creio no Deus',c:'Em  D  G'},{l:'Em ti',c:'C  D  Em  G'}]},

}

function drawChordSVG(data, name, strings=6){
  const {f:frets,fi:fingers=[],b:baseFret=1,bar}=data;
  const maxFret=Math.max(...frets.filter(fret=>fret>0),baseFret);
  const S=strings,FRETS=Math.max(4,maxFret-baseFret+1);
  const SW=strings===4?15:12, FH=14;
  const PADL=strings>4?(baseFret>1?16:10):8, PADR=8;
  const NAME_H=0, MARK_H=14, NUT_H=3, GRID_H=FRETS*FH, PADB=8;
  const gridW=(S-1)*SW;
  const W=PADL+gridW+PADR, H=NAME_H+MARK_H+NUT_H+GRID_H+PADB;
  const gridX=PADL, gridY=NAME_H+MARK_H+NUT_H;
  let g='';
  g+=`<rect width="${W}" height="${H}" rx="8" fill="#1a1a2e"/>`;
  if(baseFret>1) g+=`<text x="${gridX-3}" y="${gridY+FH*0.7}" fill="#aaa" font-size="9" text-anchor="end" font-family="Arial">${baseFret}</text>`;
  if(baseFret===1) g+=`<rect x="${gridX}" y="${NAME_H+MARK_H}" width="${gridW}" height="${NUT_H}" fill="#e9edef" rx="1.5"/>`;
  for(let f=1;f<=FRETS;f++) g+=`<line x1="${gridX}" y1="${gridY+f*FH}" x2="${gridX+gridW}" y2="${gridY+f*FH}" stroke="#2a2a4a" stroke-width="1"/>`;
  for(let s=0;s<S;s++) g+=`<line x1="${gridX+s*SW}" y1="${gridY}" x2="${gridX+s*SW}" y2="${gridY+GRID_H}" stroke="#3a3a5a" stroke-width="1"/>`;
  if(bar){const by=gridY+(bar.fr-baseFret)*FH+FH/2,bx1=gridX+bar.s*SW,bx2=gridX+bar.e*SW;g+=`<rect x="${bx1}" y="${by-6}" width="${bx2-bx1}" height="12" rx="6" fill="#d97757" opacity="0.9"/>`;}
  const mY=NAME_H+MARK_H/2+2;
  frets.forEach((fr,si)=>{
    const x=gridX+si*SW;
    if(fr<0){
      g+=`<text x="${x}" y="${mY+4}" fill="#555" font-size="11" text-anchor="middle" font-family="Arial">×</text>`;
    } else if(fr===0){
      g+=`<circle cx="${x}" cy="${mY}" r="4" fill="none" stroke="#8a8a9a" stroke-width="1.5"/>`;
    } else {
      const fy=gridY+(fr-baseFret)*FH+FH/2;
      g+=`<circle cx="${x}" cy="${fy}" r="6.5" fill="#d97757"/>`;
      if(fingers[si]>0) g+=`<text x="${x}" y="${fy+3.5}" fill="#fff" font-size="8.5" text-anchor="middle" font-family="Arial" font-weight="bold">${fingers[si]}</text>`;
    }
  });
  return `<div class="chord-card"><div class="chord-card-name">${name}</div><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${g}</svg></div>`;
}


function drawPianoSVG(noteString, name){
  const WKW=22, WKH=65, BKW=13, BKH=40;
  const totalW=7*WKW+2;
  const nm={'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
  const raw=(noteString||'').split(' - ').map(n=>n.trim());
  const notes=new Set(raw.map(n=>nm[n]||n));
  const whites=['C','D','E','F','G','A','B'];
  const blacks=[{n:'C#',p:0.67},{n:'D#',p:1.67},{n:'F#',p:3.67},{n:'G#',p:4.67},{n:'A#',p:5.67}];
  let g='';
  // white keys
  whites.forEach((note,i)=>{
    const on=notes.has(note);
    g+=`<rect x="${1+i*WKW}" y="0" width="${WKW-1.5}" height="${WKH}" rx="3" fill="${on?'#d97757':'#e9edef'}" stroke="#3a4042" stroke-width="1"/>`;
    g+=`<text x="${1+i*WKW+WKW/2}" y="${WKH-4}" fill="${on?'#fff':'#999'}" font-size="8" text-anchor="middle" font-family="Arial" font-weight="${on?'bold':'normal'}">${note}</text>`;
    if(on) g+=`<circle cx="${1+i*WKW+WKW/2}" cy="${WKH-16}" r="8" fill="rgba(0,0,0,0.2)"/>`;
  });
  // black keys
  blacks.forEach(({n,p})=>{
    const on=notes.has(n);
    const x=1+p*WKW-BKW/2;
    g+=`<rect x="${x}" y="0" width="${BKW}" height="${BKH}" rx="2" fill="${on?'#d97757':'#2a2a2a'}" stroke="${on?'#b05030':'#111'}" stroke-width="0.5"/>`;
    if(on) g+=`<text x="${x+BKW/2}" y="${BKH-4}" fill="#fff" font-size="7" text-anchor="middle" font-family="Arial" font-weight="bold">${n.replace('#','#')}</text>`;
  });
  return `<div class="chord-card" style="min-width:${totalW+22}px;">
    <div class="chord-card-name">${name}</div>
    <svg width="${totalW}" height="${WKH+2}" viewBox="0 0 ${totalW} ${WKH+2}" xmlns="http://www.w3.org/2000/svg">${g}</svg>
    <div style="color:#8696a0;font-size:10px;margin-top:3px;font-family:Arial;">${raw.join(' · ')}</div>
  </div>`;
}

function drawValidatedFrettedSVG(data,name){
  const frets=data.frets, fingers=data.fingers||[], courses=data.courses;
  const baseFret=data.baseFret||1, shownFrets=5, spacing=courses>=6?18:22, fretHeight=20;
  const padLeft=baseFret>1?24:15, padRight=15, markerHeight=22;
  const gridWidth=(courses-1)*spacing, gridTop=markerHeight+5, gridHeight=shownFrets*fretHeight;
  const width=padLeft+gridWidth+padRight, height=gridTop+gridHeight+26;
  let svg=`<rect width="${width}" height="${height}" rx="10" fill="#050b14"/>`;
  if(baseFret===1) svg+=`<rect x="${padLeft}" y="${gridTop-3}" width="${gridWidth}" height="4" rx="2" fill="#f8fafc"/>`;
  else svg+=`<text x="${padLeft-5}" y="${gridTop+14}" fill="#cbd5e1" font-size="11" text-anchor="end" font-family="Inter,Arial">${baseFret}ª</text>`;
  for(let fret=0;fret<=shownFrets;fret++) svg+=`<line x1="${padLeft}" y1="${gridTop+fret*fretHeight}" x2="${padLeft+gridWidth}" y2="${gridTop+fret*fretHeight}" stroke="#94a3b8" stroke-width="1.6"/>`;
  for(let course=0;course<courses;course++) svg+=`<line x1="${padLeft+course*spacing}" y1="${gridTop}" x2="${padLeft+course*spacing}" y2="${gridTop+gridHeight}" stroke="#cbd5e1" stroke-width="1.7"/>`;
  for(const barre of data.barres||[]){
    const y=gridTop+(barre.fret-baseFret)*fretHeight+fretHeight/2;
    const x1=padLeft+barre.start*spacing, x2=padLeft+barre.end*spacing;
    svg+=`<rect x="${x1-7}" y="${y-8}" width="${x2-x1+14}" height="16" rx="8" fill="var(--music-accent)"/>`;
    svg+=`<text x="${(x1+x2)/2}" y="${y+4}" fill="#fff" font-size="11" text-anchor="middle" font-family="Inter,Arial" font-weight="800">${barre.finger}</text>`;
  }
  frets.forEach((fret,index)=>{
    const x=padLeft+index*spacing;
    if(fret<0) svg+=`<text x="${x}" y="17" fill="#fff" font-size="16" text-anchor="middle" font-family="Inter,Arial">×</text>`;
    else if(fret===0) svg+=`<circle cx="${x}" cy="12" r="5" fill="none" stroke="#fff" stroke-width="2"/>`;
    else {
      const y=gridTop+(fret-baseFret)*fretHeight+fretHeight/2;
      const coveredByBarre=(data.barres||[]).some(barre=>barre.finger===fingers[index]&&barre.fret===fret&&index>=barre.start&&index<=barre.end);
      if(coveredByBarre) return;
      svg+=`<circle cx="${x}" cy="${y}" r="8" fill="var(--music-accent)"/>`;
      if(fingers[index]) svg+=`<text x="${x}" y="${y+4}" fill="#fff" font-size="11" text-anchor="middle" font-family="Inter,Arial" font-weight="800">${fingers[index]}</text>`;
    }
  });
  const courseLabel=data.renderer==='double-course-fretted'?'5 ordens duplas':`${courses} cordas`;
  return `<div class="chord-card" data-instrument="${data.instrumentId}" data-renderer="${data.renderer}" data-courses="${courses}"><div class="chord-card-name">${name}</div><svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" aria-label="Diagrama ${name} para ${data.instrumentId}">${svg}</svg><div class="chord-tuning">${courseLabel} · ${data.tuning}</div></div>`;
}

function drawValidatedKeyboardSVG(data,name){
  const whiteNotes=['C','D','E','F','G','A','B'];
  const blackNotes=[{note:'C#',left:26},{note:'D#',left:62},{note:'F#',left:134},{note:'G#',left:170},{note:'A#',left:206}];
  const active=new Set(data.notes), root=data.root, bass=data.bass;
  const keyColor=(note)=>note===bass&&bass!==root?'#22C55E':note===root?'var(--music-accent)':'#F2A48B';
  let svg='<rect width="252" height="116" rx="10" fill="#050b14"/>';
  whiteNotes.forEach((note,index)=>{
    const on=active.has(note), x=4+index*35;
    svg+=`<rect x="${x}" y="5" width="34" height="96" rx="3" fill="${on?keyColor(note):'#f8fafc'}" stroke="#334155" stroke-width="1.5"/>`;
    svg+=`<text x="${x+17}" y="94" fill="${on?'#fff':'#475569'}" font-size="11" text-anchor="middle" font-family="Inter,Arial" font-weight="700">${note}</text>`;
  });
  blackNotes.forEach(({note,left})=>{
    const on=active.has(note);
    svg+=`<rect x="${left}" y="5" width="22" height="61" rx="3" fill="${on?keyColor(note):'#111827'}" stroke="#020617" stroke-width="1.5"/>`;
    if(on) svg+=`<text x="${left+11}" y="57" fill="#fff" font-size="9" text-anchor="middle" font-family="Inter,Arial" font-weight="800">${note}</text>`;
  });
  return `<div class="chord-card keyboard-card" data-instrument="${data.instrumentId}" data-renderer="keyboard"><div class="chord-card-name">${name}</div><svg width="252" height="116" viewBox="0 0 252 116" aria-label="Teclas do acorde ${name}">${svg}</svg><div class="chord-tuning">${data.notes.join(' · ')}${bass!==root?` · baixo ${bass}`:''}</div></div>`;
}

function extractChords(m){
  const txt=m.blocos.map(b=>b.c).join('\n');
  const seen=new Set(), result=[];
  const re=/\b([A-Ga-g][#b♯♭]?(?:m7\(b5\)|m7\(11\)|mMaj7|maj9|maj7|M7|7M|7m|m11|m9|m7|m6|m|13|11|9|7|6|5|add9|sus[24]|[24]|dim|aug|\+|°)?(?:\/[A-Ga-g][#b♯♭]?)?)\b/g;
  let match;
  while((match=re.exec(txt))!==null){
    const chord=chordUtils.normalizeChordName(match[1]);
    if(!seen.has(chord)){seen.add(chord);result.push(chord);}
  }
  return result;
}

const missingDiagramRegistry=new Map();
function registerMissingDiagram(name){
  const key=currentInstrument+':'+name;
  if(missingDiagramRegistry.has(key)) return;
  missingDiagramRegistry.set(key,{instrumento:currentInstrument,acorde:name});
  console.info('[Diagramas] Diagrama não disponível:',currentInstrument,name);
}
function getMissingDiagramReport(){return [...missingDiagramRegistry.values()];}
function renderUnavailableChord(name){
  registerMissingDiagram(name);
  return `<div class="chord-card chord-card-unavailable"><div class="chord-card-name">${name}</div><div class="chord-unavailable-message">Diagrama não disponível</div></div>`;
}

function renderChordStrip(m){
  const el=document.getElementById('chord-strip');
  if(!el) return;
  const totalShift=currentSemitones+storedCapo-selectedCapo;
  const rawChords=extractChords(m);
  const chords=[...new Set(rawChords.map(c=>shiftText(c,totalShift)))];
  if(!chords.length){el.innerHTML='';return;}
  const html=chords.map(name=>{
    const data=getChordData(name);
    if(!data) return renderUnavailableChord(name);
    return data.renderer==='keyboard'?drawValidatedKeyboardSVG(data,name):drawValidatedFrettedSVG(data,name);
  }).join('');
  el.innerHTML=`<div class="chord-strip-wrap">${html}</div>`;
}

// detecta se uma linha é de acordes ou letra
function isChordLine(linha){
  const t = linha.trim();
  if(!t) return false;
  // remove pontos, vírgulas, x, parênteses, colchetes, números soltos — deixa só acordes e espaços
  const limpa = t.replace(/[.,\(\)\[\]x0-9]/gi,'').trim();
  // divide em tokens e verifica se todos são acordes reconhecíveis
  const tokens = limpa.split(/\s+/).filter(Boolean);
  if(!tokens.length) return false;
  const chordPattern = /^[A-G][#b]?(m|M|maj|min|dim|aug|sus)?[0-9]?(\/[A-G][#b]?)?$/;
  const todosAcordes = tokens.every(tok => chordPattern.test(tok));
  // se pelo menos 60% dos tokens parecem acordes = linha de acorde
  const acordes = tokens.filter(tok => chordPattern.test(tok));
  return acordes.length > 0 && (acordes.length / tokens.length) >= 0.6;
}

function bold(txt){
  return (txt||'').replace(/\*(.*?)\*/g,'<strong style="font-family:Arial,sans-serif;color:#ffffff;font-size:18px;font-weight:700;">$1</strong>');
}

function renderLinha(linha, totalShift){
  const t = linha.trim();
  if(!t) return '';
  // se tem asterisco, é letra explícita
  if(t.startsWith('*') && t.endsWith('*')){
    return `<div class="letra-linha">${t.replace(/\*/g,'')}</div>`;
  }
  // detecta automaticamente
  if(isChordLine(t)){
    // remove pontos dos acordes antes de exibir e transpor
    const semPontos = t.replace(/\./g,' ').replace(/\s+/g,' ').trim();
    return `<div class="chord-line">${shiftText(semPontos, totalShift)}</div>`;
  }
  // tudo que não é acorde = letra em negrito automático
  return `<div class="letra-linha">${t}</div>`;
}

function renderDetail(){
  const m=musicas.find(x=>x.id===currentDetailId); if(!m) return;
  // tom que SONA = tom original + transpose
  const soundingKey=shiftText(m.key, currentSemitones);
  // tom das formas tocadas = sounding - capo selecionado
  const shapeKey=shiftText(soundingKey, -selectedCapo);
  // display do badge igual Cifra Club: "Tom: A (forma de G)"
  if(selectedCapo>0){
    document.getElementById('detail-key').textContent=`${soundingKey} (forma de ${shapeKey})`;
  } else {
    document.getElementById('detail-key').textContent='Tom: '+soundingKey;
  }
  document.getElementById('transposed-key').textContent=soundingKey;
  const sl=document.getElementById('semitone-label');
  sl.textContent=(currentSemitones>=0?'+':'')+currentSemitones;
  sl.style.color=currentSemitones===0?'var(--text2)':currentSemitones>0?'var(--accent)':'#e2954b';
  // shapes exibidos: storedCapo - selectedCapo + transpose
  const totalShift=currentSemitones+storedCapo-selectedCapo;
  const blocosHtml = m.blocos.map(b=>{
    const linhas = b.c.split('\n');
    const corpo = linhas.map(l => renderLinha(l, totalShift)).join('');
    const letraBloco = b.l ? `<div class="letra-linha">${b.l}</div>` : '';
    return `<div class="wa-block">${corpo}${letraBloco}</div>`;
  }).join('');
  document.getElementById('detail-content').innerHTML = blocosHtml +
    `<div class="btn-row">
      <button class="btn btn-outline" onclick="editMusica('${m.id}')">✏️ Editar</button>
      <button class="btn btn-danger" onclick="deleteMusica('${m.id}')">🗑️ Excluir</button>
    </div>`;
}

  previousButton.hidden=!availability.active;
  nextButton.hidden=!availability.active;
  previousButton.disabled=!availability.canPrevious;
  nextButton.disabled=!availability.canNext;
}

function openDetail(id,options={}){
  if(options.playlistContext){
    navigationContext.setPlaylist(options.playlistContext.playlistId,options.playlistContext.songIds,options.playlistContext.currentIndex);
  } else if(!options.preserveNavigation){
    navigationContext.clear();
  }
  const nid = isNaN(+id) ? id : +id;
  currentDetailId=nid; currentSemitones=0;
  const m=musicas.find(x=>x.id===nid||String(x.id)===String(id)); if(!m) return;
  currentInstrument=instrumentDefinitions.normalizeId(m.instrumento||instrumentDefinitions.defaultId);
  document.getElementById('detail-title').textContent=m.title;
  document.getElementById('detail-artist-label').textContent=m.artist||'';
  // extrai capo armazenado
  const capoNum=m.capo?parseInt((m.capo.match(/(\d+)/)||[0,0])[1])||0:0;
  storedCapo=capoNum;
  selectedCapo=capoNum;
  document.querySelectorAll('.capo-opt').forEach(b=>b.classList.remove('active'));
  document.getElementById('capo-opt-'+Math.min(capoNum,7))?.classList.add('active');
  // músicas antigas, sem instrumento salvo, usam sempre Violão & Guitarra
  const lbl=document.getElementById('inst-label');
  const instrumentInfo=instrumentDefinitions.get(currentInstrument);
  if(lbl) lbl.textContent=instrumentInfo.icon+' '+instrumentInfo.shortName;
  const capoRow=document.getElementById('capo-row');
  if(capoRow) capoRow.style.display=(instrumentInfo.renderer==='keyboard'||currentInstrument==='cavaquinho'||currentInstrument==='viola-caipira-cebolao-e')?'none':'flex';
  renderDetail();
  renderChordStrip(m);
  updatePlaylistNavigation();
  const vd=document.getElementById('view-detail');
  vd.style.display='flex'; vd.style.zIndex='20';
}

function openDetailFromPlaylist(playlistId,index){
  const playlist=setlists.find(item=>String(item.id)===String(playlistId));
  if(!playlist) return;
  const orderedIds=playlist.musicas.filter(songId=>musicas.some(song=>String(song.id)===String(songId)));
  const songId=orderedIds[index];
  if(songId===undefined) return;
  openDetail(songId,{playlistContext:{playlistId:playlist.id,songIds:orderedIds,currentIndex:index}});
}

  if(!sorted.length){el.innerHTML='<div class="empty-state"><div class="emoji">🎵</div><p>Nenhuma encontrada</p></div>';return;}
  const grouped={};
  sorted.forEach(m=>{const l=m.title[0].toUpperCase();(grouped[l]||(grouped[l]=[])).push(m);});
  el.innerHTML=Object.keys(grouped).sort().map(l=>
    `<div class="section-label">${l}</div>`+
    grouped[l].map(m=>`<div class="music-item" onclick="openDetail('${m.id}')">
      <div class="music-avatar">🎵</div>
      <div class="music-info">
        <div class="music-title">${m.title}</div>
        <div class="music-sub">${m.artist||m.capo||m.blocos.length+' blocos'}</div>
      </div>
      ${m.key?`<span class="key-badge">${m.key}</span>`:''}
    </div>`).join('')
  ).join('');
}

// ── EDIT / ADD ────────────────────────────────────────────────────────
function editMusica(id){
  const nid=isNaN(+id)?id:+id;
  const m=musicas.find(x=>x.id===nid); editingId=nid;
  const raw=m.blocos.map(b=>(b.l?`${b.l}\n`:'')+b.c).join('\n\n');
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">Editar música</div>
    <div class="form-group"><label class="form-label">Título</label><input class="form-input" id="fm-title" value="${m.title}"></div>
    <div class="form-group"><label class="form-label">Artista / Compositor</label><input class="form-input" id="fm-artist" value="${m.artist||''}" placeholder="ex: Fernandinho, Aline Barros..."></div>
    <div class="form-group"><label class="form-label">Tom original</label><input class="form-input" id="fm-key" value="${m.key||''}"></div>
    <div class="form-group"><label class="form-label">Capotraste</label><input class="form-input" id="fm-capo" value="${m.capo||''}"></div>
    <div class="form-group">
      <label class="form-label">Cifras</label>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;">Use *texto* para negrito. Linha em branco separa estrofes.</div>
      <textarea class="form-textarea" id="fm-blocos" style="min-height:180px;">${raw}</textarea>
    </div>
    <button class="btn btn-primary" onclick="saveMusica()">Salvar</button>
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modal-overlay').style.display='flex';
}

function saveMusica(){
  const t=document.getElementById('fm-title').value.trim(); if(!t) return;
  const raw=document.getElementById('fm-blocos').value;
  const blocos=parseBlocks(raw);
  if(!blocos.length){alert('Adicione pelo menos um acorde!'); return;}
  const idx=musicas.findIndex(m=>m.id===editingId);
  if(idx===-1) return;
  musicas[idx]={...musicas[idx],title:t,artist:document.getElementById('fm-artist').value.trim(),key:document.getElementById('fm-key').value.trim(),capo:document.getElementById('fm-capo').value.trim(),blocos};
  salvar(); closeModal(); renderMusicas(); openDetail(musicas[idx].id); showToast('✅ '+t+' salva!');
}
function deleteMusica(id){
  const nid=isNaN(+id)?id:+id;
  if(!confirm('Excluir esta música?')) return;
  musicas=musicas.filter(m=>m.id!==nid);
  setlists=setlists.map(s=>({...s,musicas:s.musicas.filter(mid=>String(mid)!==String(nid))}));
  salvar(); closeDetail(); renderMusicas();
}
function parseBlocks(raw){
  const lines=raw.trim().split('\n');
  const blocks=[]; let cur=null;
  lines.forEach(l=>{
    const lt=l.trim();
    if(!lt){ // linha vazia = nova estrofe
      if(cur && cur.c.trim()) { blocks.push(cur); cur=null; }
      return;
    }
    // [Bloco] ou *Bloco* = label
    if((lt.startsWith('[')&&lt.endsWith(']'))||(lt.startsWith('*')&&lt.endsWith('*')&&!lt.slice(1,-1).includes('*'))){
      if(cur && cur.c.trim()) blocks.push(cur);
      const label = lt.startsWith('[') ? lt.slice(1,-1) : lt;
      cur={l:label, c:''};
    } else {
      if(!cur) cur={l:'',c:''};
      cur.c+=(cur.c?'\n':'')+lt;
    }
  });
  if(cur && cur.c.trim()) blocks.push(cur);
  return blocks.length?blocks:[{l:'',c:raw}];
}
function openFab(){if(currentTab==='musicas') openAddMusica(); else openAddSetlist();}
function openAddMusica(){
  editingId=null;
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">Nova música</div>
    <div class="form-group"><label class="form-label">Título</label><input class="form-input" id="fm-title" placeholder="Nome da música"></div>
    <div class="form-group"><label class="form-label">Artista / Compositor</label><input class="form-input" id="fm-artist" placeholder="ex: Fernandinho, Aline Barros..."></div>
    <div class="form-group"><label class="form-label">Tom</label><input class="form-input" id="fm-key" placeholder="ex: G, Am, C#m"></div>
    <div class="form-group"><label class="form-label">Capotraste</label><input class="form-input" id="fm-capo" placeholder="ex: Capotraste casa 2"></div>
    <div class="form-group">
      <label class="form-label">Cifras</label>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.5;">
        Digite a cifra e a letra alternadas. Linha em branco separa estrofes.<br>
        <span style="color:var(--accent);">Ex:<br>G9  Em7  C9  Am7<br>Ao que está assentado<br><br>C9  D9  Bm7  Em<br>Quem já pisou</span>
      </div>
      <textarea class="form-textarea" id="fm-blocos" style="min-height:200px;" placeholder="G9  Em7  C9  Am7&#10;Ao que está assentado&#10;&#10;C9  D9  Bm7  Em&#10;Quem já pisou"></textarea>
    </div>

function addMusica(){
  const t=document.getElementById('fm-title').value.trim(); if(!t) return;
  const blocos=parseBlocks(document.getElementById('fm-blocos').value);
  musicas.push({id:Date.now(),title:t,artist:document.getElementById('fm-artist').value.trim(),key:document.getElementById('fm-key').value.trim(),capo:document.getElementById('fm-capo').value.trim(),blocos});
  salvar(); closeModal(); renderMusicas();
}

// ── SETLISTS ──────────────────────────────────────────────────────────
function openAddSetlist(prefill){
  editingId=prefill?prefill.id:null;
  const s=prefill||{title:'',date:new Date().toLocaleDateString('pt-BR'),musicas:[]};
  let selectedIds=[...s.musicas];

  function renderSelected(){
    const el=document.getElementById('pl-selected');
    if(!el) return;
    el.innerHTML=selectedIds.map((id,i)=>{
      const nid2=isNaN(+id)?id:+id; const m=musicas.find(x=>x.id===nid2); if(!m) return '';
      return `<div class="pl-sel-row" id="plrow-${id}" draggable="true"
        ondragstart="plDragStart(${id})" ondragover="plDragOver(event,${id})" ondrop="plDrop(${id})" ondragend="plDragEnd()">
        <span style="font-size:18px;color:var(--text2);cursor:grab;padding-right:6px;">☰</span>
        <div style="flex:1;min-width:0;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.title}</div>
        <span class="key-badge" style="margin-right:6px;">${m.key||''}</span>
        <span onclick="plRemove(${id})" style="color:var(--danger);font-size:20px;cursor:pointer;padding:0 4px;">×</span>
      </div>`;
    }).join('');
    const cnt=document.getElementById('pl-count');
    if(cnt) cnt.textContent=selectedIds.length+' música(s) na playlist';
  }

  function renderAvailable(){
    const q=(document.getElementById('pl-search')||{value:''}).value.toLowerCase();
    const sorted=[...musicas].sort((a,b)=>a.title.localeCompare(b.title,'pt'));
    const filtradas=sorted.filter(m=>m.title.toLowerCase().includes(q)&&!selectedIds.includes(m.id));
    const el=document.getElementById('pl-all');
    if(!el) return;
    el.innerHTML=filtradas.length===0
      ?'<div style="padding:14px;color:var(--text2);font-size:13px;text-align:center;">Todas adicionadas ✓</div>'
      :filtradas.map(m=>`
        <div class="pl-add-row" onclick="plAdd(${m.id})">
          <div style="flex:1;min-width:0;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.title}</div>
          <span style="font-size:12px;color:var(--text2);margin-right:6px;">${m.artist||''}</span>
          <span class="key-badge" style="margin-right:6px;">${m.key||''}</span>
          <span style="color:var(--accent);font-size:22px;font-weight:700;">+</span>
        </div>`).join('');
  }

  // monta o modal UMA VEZ só
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">${editingId?'Editar':'Nova'} playlist</div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="fs-title" value="${s.title}" placeholder="Ex: Domingo manhã"></div>
    <div class="form-group"><label class="form-label">Data</label><input class="form-input" id="fs-date" value="${s.date}"></div>
    <div class="form-group">
      <label class="form-label">📋 Ordem da playlist (arraste pra reordenar)</label>
      <div id="pl-selected"></div>
    </div>
    <div class="form-group">
      <label class="form-label">➕ Adicionar músicas</label>
      <div class="search-wrap" style="margin-bottom:8px;position:relative;">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="pl-search" placeholder="Buscar música..." autocomplete="off">
      </div>
      <div id="pl-all" style="max-height:220px;overflow-y:auto;background:var(--bg3);border-radius:9px;border:1px solid var(--border);"></div>
    </div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px;" id="pl-count"></div>
    <button class="btn btn-primary" onclick="saveSetlist()">Salvar</button>
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>`;

  // listener do search sem recriar o modal
  document.getElementById('pl-search').addEventListener('input', renderAvailable);

  renderSelected();
  renderAvailable();

  window.plAdd=function(id){
    if(!selectedIds.includes(id)){selectedIds.push(id); renderSelected(); renderAvailable();}
  };
  window.plRemove=function(id){
    selectedIds=selectedIds.filter(x=>x!==id); renderSelected(); renderAvailable();
  };

  let dragId=null;
  window.plDragStart=function(id){dragId=id;};
  window.plDragEnd=function(){dragId=null;};
  window.plDragOver=function(e){e.preventDefault();};
  window.plDrop=function(targetId){
    if(dragId===null||dragId===targetId) return;
    const from=selectedIds.indexOf(dragId), to=selectedIds.indexOf(targetId);
    if(from===-1||to===-1) return;
    selectedIds.splice(from,1); selectedIds.splice(to,0,dragId);
    renderSelected();
  };
  window.saveSetlist=function(){
    const t=document.getElementById('fs-title').value.trim(); if(!t) return;
    if(editingId){const idx=setlists.findIndex(x=>x.id===editingId);setlists[idx]={...setlists[idx],title:t,date:document.getElementById('fs-date').value,musicas:selectedIds};}
    else{setlists.push({id:Date.now(),title:t,date:document.getElementById('fs-date').value,musicas:selectedIds});}
    salvar(); closeModal(); renderSetlists();
  };

  document.getElementById('modal-overlay').style.display='flex';
}

function toggleRow(id){
  const row=document.getElementById('row-'+id);
  const check=document.getElementById('check-'+id);
  const selected=check.textContent==='✓';
  if(selected){
    row.style.background='';
    check.style.border='2px solid var(--text2)';
    check.style.background='transparent';
    check.textContent='';
  } else {
    row.style.background='var(--accent2)';
    check.style.border='2px solid var(--accent)';
    check.style.background='var(--accent)';
    check.textContent='✓';
  }
  const count=document.querySelectorAll('[id^="check-"]');
  const sel=[...count].filter(c=>c.textContent==='✓').length;
  const sc=document.getElementById('sel-count');
  if(sc) sc.textContent='Selecionadas: '+sel;
}
function toggleChip(id){document.getElementById('chip-'+id)?.classList.toggle('selected');}
/* saveSetlist is defined by openAddSetlist as window.saveSetlist */
function renderSetlists(){
  const el=document.getElementById('lista-setlists');
  if(!setlists.length){el.innerHTML='<div class="empty-state"><div class="emoji">📋</div><p>Nenhuma playlist ainda</p><p style="font-size:12px;margin-top:6px;">Toque no + para criar</p></div>';return;}
  el.innerHTML=[...setlists].reverse().map(s=>{
    const ms=s.musicas.map(id=>musicas.find(m=>m.id===id)).filter(Boolean);
    return `<div class="setlist-item" onclick="openSD('${s.id}')">
      <div class="sl-avatar">📋</div>
      <div class="sl-info"><div class="sl-title">${s.title}</div><div class="sl-sub">${s.date} · ${ms.map(m=>m.title).join(', ')||'Vazio'}</div></div>
      <span class="sl-count">${ms.length}</span>
    </div>`;
  }).join('');
}
function openSD(id){
  const nid=isNaN(+id)?id:+id;
  const s=setlists.find(x=>x.id===nid||String(x.id)===String(id)); if(!s) return;
  currentSdId=nid;
  document.getElementById('sd-title').textContent=s.title;
  document.getElementById('sd-date').textContent=s.date;
  const ms=s.musicas.map(mid=>musicas.find(m=>m.id===mid)).filter(Boolean);
  document.getElementById('sd-content').innerHTML=
    (ms.length===0?'<div class="empty-state"><div class="emoji">🎵</div><p>Nenhuma música nesta playlist</p></div>':
    ms.map((m,i)=>`
    <div class="sd-row" style="cursor:pointer;" onclick="openDetailFromPlaylist('${id}',${i})">
      <span class="sd-num">${i+1}</span>
      <div style="flex:1;min-width:0;pointer-events:none;">
        <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.title}</div>
        <div style="font-size:12px;color:var(--text2);">${m.capo||'—'}</div>
      </div>
      <span style="font-size:11px;color:var(--accent);font-family:monospace;font-weight:700;pointer-events:none;">${m.key||''}</span>
      <span style="color:var(--accent);font-size:18px;pointer-events:none;">›</span>
    </div>`).join(''))+
    `<div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-outline" onclick="editSetlistById('${id}')">✏️ Editar</button>
      <button class="btn btn-outline" style="border-color:#4a9eff;color:#4a9eff;" onclick="sharePlaylist('${id}')">🔗 Compartilhar</button>
      <button class="btn btn-danger" onclick="deleteSetlist('${id}')">🗑️ Excluir</button>
    </div>`;
  document.getElementById('view-sd').style.display='flex';
  document.getElementById('view-sd').style.zIndex='15';
}

function closeSD(){
  document.getElementById('view-sd').style.display='none';
  renderSetlists();
}

function editSetlistById(id){
  const nid=isNaN(+id)?id:+id;
  closeSD();
  setTimeout(()=>openAddSetlist(setlists.find(s=>s.id===nid||String(s.id)===String(id))),150);
}
function sharePlaylist(id){
  const nid=isNaN(+id)?id:+id; const s=setlists.find(x=>x.id===nid||String(x.id)===String(id)); if(!s) return;
  const ms=s.musicas.map(mid=>musicas.find(m=>m.id===mid)).filter(Boolean);
  const texto='🎸 '+s.title+' ('+s.date+')\n\n'+
    ms.map((m,i)=>(i+1)+'. '+m.title+(m.artist?' — '+m.artist:'')+(m.key?' | Tom: '+m.key:'')+(m.capo?' | '+m.capo:'')).join('\n')+
    '\n\n📱 Simplificando Cifras';
  if(navigator.share){
    navigator.share({title:s.title,text:texto}).catch(()=>prompt('Copie:',texto));
  } else {
    prompt('Copie e envie:',texto);
  }
}

// ── PLAYLIST COMPARTILHADA ────────────────────────────────────────────
function checkShareParam(){
  const params=new URLSearchParams(location.search);
  const share=params.get('share');
  if(!share) return;
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(share))));
    openSharedView(data);
  } catch(e){ console.error('Link inválido'); }
}

function openSharedView(data){
  // cria músicas temporárias e um setlist temporário
  const tempMusicas=data.musicas.map((m,i)=>({...m,id:'shared_'+i}));
  const tempSetlist={id:'shared',title:data.title,date:data.date,musicas:tempMusicas.map(m=>m.id)};
  // injeta temporariamente
  musicas=[...musicas,...tempMusicas];
  setlists=[...setlists,tempSetlist];
  // mostra banner de playlist compartilhada
  showToast('🎸 Playlist: '+data.title);
  // switch para aba playlists e abre
  switchTab('setlists');
  setTimeout(()=>openSD('shared'),300);
}

function deleteSetlist(id){
  const nid=isNaN(+id)?id:+id;
  if(!confirm('Excluir esta playlist?')) return;
  setlists=setlists.filter(s=>s.id!==nid&&String(s.id)!==String(id));
  salvar(); closeSD();
}
function closeModalOut(e){if(e.target===document.getElementById('modal-overlay')) closeModal();}
function closeModal(){document.getElementById('modal-overlay').style.display='none'; editingId=null;}

function exportarBiblioteca(){
  const result=libraryExporter.export({
    catalogoPadrao,
    musicas,
    playlists:setlists,
    medleys:medleyBlocos,
    favoritos:storage.get('sc_favorites_v2',storage.get('cifras_favoritos_v1',[])),
    configuracoes:{
      instrumento:currentInstrument,
      velocidadeAutoScroll:scrollSpeed,
      tamanhoFontePalco:stageFontSizes[stageFontIndex]
    }
  });
  const userMessage=result.storedCount
    ?`${result.storedCount} música(s) da biblioteca salva e ${result.standardCount} do catálogo padrão exportadas.`
    :`${result.standardCount} música(s) do catálogo padrão exportadas. Nenhuma biblioteca salva foi encontrada.`;
  showToast('✅ '+userMessage);
  alert('Exportação concluída!\n\n'+userMessage+'\nPlaylists, medleys, favoritos, configurações e armazenamento bruto também foram incluídos.');
}

checkShareParam();
